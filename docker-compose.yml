# =============================================================================
# Sheger Health Connect - Full Stack Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d            # Start all services
#   docker compose logs -f          # Follow logs
#   docker compose down             # Stop all services
#   docker compose exec backend sh  # Shell into backend
#
# Environment Variables (create .env in project root):
#   DB_PASSWORD       - MySQL root/user password (required)
#   JWT_SECRET        - JWT signing secret (required)
#   FRONTEND_URL      - Frontend URL for CORS (default: http://localhost:5173)
#   OPENAI_API_KEY    - OpenAI API key for AI features
#   EMAIL_USER        - Email service username
#   EMAIL_PASS        - Email service password
#   MYSQL_PORT        - External MySQL port (default: 3306)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend-build:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sheger-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Backend API Server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Port NOT exposed to host - only accessible via nginx reverse proxy
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - USE_SQLITE=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=sheger
      - DB_PASS=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - DB_NAME=sheger_health
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRES_IN=24h
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sheger-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - backend-uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    # MySQL port NOT exposed to host for security
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_DATABASE: sheger_health
      MYSQL_USER: sheger
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sheger-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mysql-data:
    driver: local
  backend-uploads:
    driver: local
  frontend-build:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  sheger-network:
    driver: bridge
